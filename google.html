<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f1f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            width: 450px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
        }

        .logo {
            margin-bottom: 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #202124;
        }

        .account-list {
            text-align: left;
            list-style-type: none;
            padding: 0;
        }

        .account-item {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #f1f1f1;
        }

        .account-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .account-info {
            flex-grow: 1;
        }

        .account-email {
            font-size: 14px;
            color: #5f6368;
        }

        .use-another {
            padding: 15px;
            text-align: left;
            color: #1a73e8;
            cursor: pointer;
        }

        .use-another:hover {
            background-color: #f1f3f4;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 12px;
            color: #5f6368;
        }

        .footer a {
            color: #1a73e8;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Logo_2013_Google.png/1024px-Logo_2013_Google.png" class="logo" alt="Google Logo" width="100">
    <h2>Choose an account</h2>
    <ul class="account-list">
        <li class="account-item">
            <img src="https://i.pravatar.cc/40?u=yashnaidu@gmail.com" alt="User">
            <div class="account-info">
                <strong>Shubh Raj</strong>
                <div class="account-email">iishubhamraj2001@gmail.com</div>
            </div>
        </li>
        <li class="account-item">
            <img src="https://i.pravatar.cc/40?u=revathigalla@gmail.com" alt="User">
            <div class="account-info">
                <strong>Ritwik T </strong>
                <div class="account-email">ritwiktiwari09999@gmail.com</div>
            </div>
        </li>
        <li class="account-item">
            <img src="https://i.pravatar.cc/40?u=hipothansaithummala@gmail.com" alt="User">
            <div class="account-info">
                <strong>Sai Yashwanth</strong>
                <div class="account-email">yashnaidu899@gmail.com</div>
            </div>
        </li>
    </ul>
    <div class="use-another">Use another account</div>
    <div class="footer">
        <div>English (United States)</div>
        <div>
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </div>
</div>

</body>
</html>
