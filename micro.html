<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Security Info</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }

        /* Card Container */
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: left;
        }

        /* Microsoft logo */
        .logo {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }

        /* Title */
        h2 {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        /* Text content */
        p {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        a {
            color: #0078D4;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Email display */
        .email {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .email-list {
            font-size: 14px;
            margin-left: 20px;
            color: #333;
        }

        /* Buttons */
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button {
            padding: 10px 16px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.3s ease;
        }

        .update-btn {
            background-color: #c3c3c3;
            color: black;
        }

        .update-btn:hover {
            background-color: #b0b0b0;
        }

        .confirm-btn {
            background-color: #0078D4;
            color: white;
            border: 2px solid #005a9e;
        }

        .confirm-btn:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Logo">
            <span style="font-size: 16px; font-weight: bold;">Microsoft</span>
        </div>

        <div class="email">revathigalla189@gmail.com</div>

        <h2>Is your security info still accurate?</h2>

        <p>We just want to make sure this <a href="#">security info</a> is up-to-date, so we can use it to verify your identity or alert you if there's ever a problem with your account.</p>

        <ul class="email-list">
            <li>revathigalla189@gmail.com</li>
        </ul>

        <p><a href="#">I don't have any of these</a></p>

        <div class="button-container">
            <button class="button update-btn">Update now</button>
            <button class="button confirm-btn">Looks good!</button>
        </div>
    </div>
</body>
</html>
