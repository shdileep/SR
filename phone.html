<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f6f6f6;
            margin: 0;
        }

        /* Container */
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Header */
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        /* Country dropdown */
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            background-color: #f7f7f7;
        }

        /* Phone input */
        input[type="tel"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            color: #333;
        }

        /* Continue Button */
        button.continue-btn {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button.continue-btn:hover {
            background-color: #45a049;
        }

        /* Already have account */
        .login-link {
            margin: 15px 0;
            font-size: 14px;
        }

        .login-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: #388E3C;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #999;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        /* Alternate options */
        .alt-options {
            display: grid;
            grid-template-columns: 1fr;
            grid-gap: 15px;
            margin-top: 20px;
        }

        .alt-options button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            font-weight: 500;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }

        .alt-options button:hover {
            background-color: #e0e0e0;
        }

        .alt-options button img {
            margin-right: 12px;
            width: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .alt-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create an account</h1>
        <select id="country-code">
            <option value="+91">India (+91)</option>
            <option value="+1">USA (+1)</option>
            <option value="+44">UK (+44)</option>
            <option value="+61">Australia (+61)</option>
            <!-- Add more country options as needed -->
        </select>
        <input type="tel" placeholder="Phone number*" required>

        <button class="continue-btn">Continue</button>

        <div class="login-link">
            Already have an account? <a href="#">Login</a>
        </div>

        <div class="divider">OR</div>

        <div class="alt-options">
            <button onclick="location.href='email.html'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="Email Icon"> Continue with email
            </button>
            <button onclick="location.href='google.html'">
                <img src="C:\xampp\htdocs\Technet\img\google.png" alt="Google Icon"> Continue with Google
            </button>
            <button onclick="location.href='micro.html'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Icon"> Continue with Microsoft Account
            </button>
            <button onclick="location.href='apple.html'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Icon"> Continue with Apple
            </button>
        </div>
    </div>
</body>
</html>
